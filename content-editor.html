<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Research Content Editor</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Piazzolla:opsz,wght@8..30,400;8..30,500;8..30,600&display=swap" rel="stylesheet" /><link rel="stylesheet" href="assets/editor.css" /></head>
<body><main class="editor-shell"><header><div><p class="kicker">Local content editor</p><h1>Research<br /><em>desk.</em></h1></div><p>This page edits the website's research data, not its layout. Export the finished file and replace <code>assets/research-data.js</code> in GitHub.</p></header><section class="editor-grid"><aside><div class="aside-head"><p class="kicker">Papers</p><button type="button" data-add>Add paper +</button></div><div data-paper-nav></div></aside><form data-form><div class="form-head"><p class="kicker">Editing</p><button type="button" class="remove" data-remove>Remove</button></div><label>Title<input name="title" required /></label><label>Dates <small>One per line: First draft | 2025.02; Published | 2026.06. One line is also fine.</small><textarea name="dates" rows="3"></textarea></label><label>Type<input name="type" placeholder="Working paper" /></label><label>Authors <small>Separate names with semicolons</small><input name="authors" /></label><div class="two"><label>Venue<input name="venue" /></label><label>Publication details<input name="publication" /></label></div><label style="display:flex;align-items:center;gap:8px"><input name="venueBold" type="checkbox" style="width:auto;margin:0" /> <span>Emphasize venue in bold</span></label><label>Keywords <small>Separate with commas; lower-case preferred</small><input name="tags" /></label><label>Abstract<textarea name="abstract" rows="6"></textarea></label><label>Outcomes <small>One item per line: awards, accepted conferences, talks</small><textarea name="outcomes" rows="4"></textarea></label><label>Paper URL<input name="paperUrl" placeholder="https://..." /></label><label>Image path or public URL <small>Optional; for example assets/images/paper-name.jpg</small><input name="media" /></label></form></section><footer><p data-save-state>Changes stay in this browser until you export.</p><button type="button" data-download>Download research-data.js</button></footer></main><script src="assets/research-data.js"></script><script src="assets/content-editor.js"></script></body></html>
