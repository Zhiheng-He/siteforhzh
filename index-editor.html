<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Home Content Editor</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Piazzolla:opsz,wght@8..30,400..700&display=swap" rel="stylesheet" /><link rel="stylesheet" href="assets/editor.css" /></head>
<body><main class="editor-shell"><header><div><p class="kicker">Local content editor</p><h1>Home<br /><em>desk.</em></h1></div><p>Update the homepage text, photo path, contact details, and News list. Export the file and replace <code>assets/home-data.js</code> in GitHub.</p></header><section class="editor-grid"><aside><div class="aside-head"><p class="kicker">News</p><button type="button" data-add>Add update +</button></div><div data-news-nav></div></aside><form data-form><div class="form-head"><p class="kicker">Homepage</p><button type="button" class="remove" data-remove>Remove update</button></div><label>Name<input name="name" /></label><label>Email<input name="email" type="email" /></label><label>CV URL or file path <small>For example assets/CV.pdf or a public URL</small><input name="cvUrl" /></label><div class="two"><label>Headline, first line<input name="headlineFirst" /></label><label>Headline, emphasis line<input name="headlineEmphasis" /></label></div><label>Introduction<textarea name="intro" rows="4"></textarea></label><label>Portrait image path <small>For example assets/images/portrait.jpg</small><input name="portrait" /></label><label>Portrait fallback text <small>Use a new line with Enter</small><textarea name="portraitLabel" rows="2"></textarea></label><div class="form-head news-edit"><p class="kicker">Selected news update</p></div><label>Text<input name="newsText" /></label></form></section><footer><p data-save-state>Changes stay in this browser until you export.</p><button type="button" data-download>Download home-data.js</button></footer></main><script src="assets/home-data.js"></script><script src="assets/home-editor.js"></script></body></html>
