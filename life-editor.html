<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Life Album Editor</title><link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /><link href="https://fonts.googleapis.com/css2?family=Piazzolla:opsz,wght@8..30,400..700&display=swap" rel="stylesheet" /><link rel="stylesheet" href="assets/editor.css" /></head>
<body><main class="editor-shell"><header><div><p class="kicker">Local content editor</p><h1>Life<br /><em>albums.</em></h1></div><p>Create albums and select many photographs at once. The page prepares paths and exports the album file; upload the selected image files and the exported file to GitHub together.</p></header><section class="editor-grid"><aside><div class="aside-head"><p class="kicker">Albums</p><button type="button" data-add>Add album +</button></div><div data-album-nav></div></aside><form data-form><div class="form-head"><p class="kicker">Editing</p><button type="button" class="remove" data-remove>Remove</button></div><label>Location / album title<input name="location" required /></label><label>Cover image path <small>Optional. Choosing a batch below will use its first photo as the cover.</small><input name="cover" placeholder="assets/images/albums/kyoto/cover.jpg" /></label><label>Batch-select photographs <small>Choose all photos for this album at once.</small><input name="photos" type="file" accept="image/*" multiple /></label><div class="photo-file-list" data-file-list></div></form></section><footer><p data-save-state>Changes stay in this browser until you export.</p><button type="button" data-download>Download life-data.js</button></footer></main><script src="assets/life-data.js"></script><script src="assets/life-editor.js"></script></body></html>
